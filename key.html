<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>License Manager</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff}
.wrap{max-width:900px;margin:auto;padding:20px}
h1{margin:0 0 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.card{background:#1e293b;border-radius:16px;padding:18px;box-shadow:0 8px 20px rgba(0,0,0,.25)}
.value{font-size:34px;font-weight:bold;margin-top:8px}
.actions{margin:20px 0}
button{border:none;border-radius:12px;padding:14px 18px;background:#2563eb;color:#fff;font-size:16px;cursor:pointer}
button:hover{background:#1d4ed8}
.row{display:flex;gap:10px;flex-wrap:wrap}
pre{background:#020617;border-radius:12px;padding:15px;max-height:350px;overflow:auto}
</style>
</head>
<body>
<div class="wrap">
<h1>📋 License Manager</h1>

<div class="grid">
<div class="card"><div>Total Keys</div><div id="total" class="value">-</div></div>
<div class="card"><div>Available</div><div id="available" class="value">-</div></div>
<div class="card"><div>Used</div><div id="used" class="value">-</div></div>
</div>

<div class="card actions">
<h3>Generate Keys</h3>
<div class="row">
<button onclick="createKeys(10)">Create 10 Keys</button>
<button onclick="createKeys(50)">Create 50 Keys</button>
<button onclick="loadStats()">Refresh</button>
</div>
</div>

<div class="card">
<h3>Generated Keys</h3>
<pre id="out">Nothing generated yet.</pre>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {getFirestore,doc,setDoc,collection,getDocs} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC3rdFLymcNpe7TwWLlhM9PLKi-nIDi-n0",
authDomain:"billbook-efe3f.firebaseapp.com",
projectId:"billbook-efe3f",
storageBucket:"billbook-efe3f.firebasestorage.app",
messagingSenderId:"601890572433",
appId:"1:601890572433:web:786e37690fd5fe0fe09730",
measurementId:"G-JTN29M9X65"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

function blk(n){
 const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
 let s="";
 for(let i=0;i<n;i++) s+=c[Math.floor(Math.random()*c.length)];
 return s;
}
function makeKey(){return `${blk(4)}-${blk(4)}-${blk(4)}`;}

window.createKeys=async(count)=>{
 const out=document.getElementById("out");
 out.textContent="Creating...";
 let arr=[];
 for(let i=0;i<count;i++){
   const k=makeKey();
   await setDoc(doc(db,"licenses",k),{status:"available"});
   arr.push(k);
 }
 out.textContent=arr.join("\n");
 loadStats();
}

window.loadStats=async()=>{
 const snap=await getDocs(collection(db,"licenses"));
 let total=0,available=0,used=0;
 snap.forEach(d=>{
   total++;
   const s=d.data().status;
   if(s==="available") available++;
   else used++;
 });
 totalEl.textContent=total;
 availableEl.textContent=available;
 usedEl.textContent=used;
}
const totalEl=document.getElementById("total");
const availableEl=document.getElementById("available");
const usedEl=document.getElementById("used");
loadStats();
</script>
</body>
</html>
